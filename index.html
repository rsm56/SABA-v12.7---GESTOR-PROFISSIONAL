<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SABA v13.3 - INVERSÃO INTELIGENTE</title>
    <style>
        :root { --blue: #1a73e8; --red: #d93025; --green: #188038; --dark: #202124; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #f1f3f4; margin: 0; padding: 10px; color: var(--dark); }
        .container { max-width: 1000px; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-top: 6px solid var(--blue); }
        .toolbar { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .btn-tool { cursor: pointer; border: 1px solid #dadce0; border-radius: 8px; padding: 10px; font-weight: bold; font-size: 11px; background: white; flex: 1; min-width: 90px; }
        .btn-danger { color: var(--red); border-color: #f8d7da; }
        .grid { display: flex; flex-direction: column; gap: 15px; }
        .card { border: 1px solid #dadce0; padding: 12px; border-radius: 8px; background: #fff; }
        h3 { color: var(--blue); margin: 0 0 10px 0; font-size: 14px; text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 4px; }
        textarea { width: 100%; height: 90px; border: 1px solid #bdc1c6; border-radius: 6px; padding: 8px; font-size: 14px; box-sizing: border-box; font-family: monospace; resize: none; }
        .h-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .h-box { background: #f8f9fa; padding: 5px; border-radius: 4px; text-align: center; border: 1px solid #eee; }
        .h-box span { font-size: 9px; font-weight: bold; color: #5f6368; display: block; }
        input { width: 100%; padding: 10px; border: 1px solid #bdc1c6; border-radius: 6px; text-align: center; font-weight: bold; font-size: 18px; box-sizing: border-box; }
        .btn-exec { background: var(--blue); color: white; width: 100%; padding: 16px; font-size: 16px; margin: 15px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #1557b0; }
        .panel { background: #e8f5e9; border: 2px solid var(--green); padding: 12px; border-radius: 8px; margin-top: 15px; display: none; }
        .t-grid { display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 10px; }
        .t-item { background: white; border: 1px solid var(--green); padding: 12px; border-radius: 6px; text-align: center; font-size: 19px; font-weight: bold; color: #333; }
        .m-card { background: #f8f9fa; border: 1px solid #dadce0; padding: 15px; border-radius: 8px; margin-top: 20px; text-align: center; }
        .m-flex { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .g-row { display: flex; justify-content: center; gap: 10px; }
        .g-box { border: 1px solid #dadce0; padding: 8px; border-radius: 6px; background: white; min-width: 75px; }
        .g-num { font-size: 24px; color: var(--red); font-weight: bold; }
    </style>
</head>
<body onload="carregarDB()">

<div class="container">
    <div class="toolbar">
        <button class="btn-tool" onclick="fazerBackup()">💾 BACKUP</button>
        <button class="btn-tool" onclick="document.getElementById('inputArquivo').click()">📂 RESTAURAR</button>
        <input type="file" id="inputArquivo" style="display:none" onchange="restaurarBackup(event)">
        <button class="btn-tool" onclick="exibirLancados()">📋 LANÇADOS</button>
        <button class="btn-tool btn-danger" onclick="resetarSistema()">🧨 LIMPAR</button>
    </div>

    <div class="grid">
        <div class="card">
            <h3>📋 CICLO & DEZENAS VICIADAS</h3>
            <textarea id="txtAtrasados" placeholder="Grupos atrasados..."></textarea>
            <textarea id="txtViciadas" style="margin-top:8px; border-color:var(--blue)" placeholder="Dezenas viciadas..."></textarea>
        </div>
        <div class="card">
            <h3>🕒 RESULTADOS & EXCLUSÃO</h3>
            <div class="h-grid">
                <div class="h-box"><span>COR</span><input type="number" id="h1"></div>
                <div class="h-box"><span>PPT</span><input type="number" id="h2"></div>
                <div class="h-box"><span>PTM</span><input type="number" id="h3"></div>
                <div class="h-box"><span>PT</span><input type="number" id="h4"></div>
                <div class="h-box"><span>PTV</span><input type="number" id="h5"></div>
                <div class="h-box"><span>PTN</span><input type="number" id="h6"></div>
            </div>
            <input type="text" id="txtSaidas" style="margin-top:10px; font-size:14px;" placeholder="Dezenas que já saíram hoje">
        </div>
    </div>

    <button class="btn-exec" onclick="processarGeral()">ATUALIZAR & INVERTER DUPLICADOS</button>

    <div id="painelPalpite" class="panel">
        <h3 style="color:var(--green); border-bottom: 2px solid var(--green);">🎯 PALPITES (SISTEMA DE INVERSÃO)</h3>
        <div id="gridPalpites" class="t-grid"></div>
    </div>

    <div class="m-card">
        <h3>CÁLCULO MESTRE</h3>
        <div class="m-flex">
            <input type="number" id="valA" style="width:100px"> <b>X</b> <input type="number" id="valB" style="width:100px">
            <button onclick="executarCalcMestre()" style="padding:10px; background:var(--dark); color:white; border:none; border-radius:6px;">=</button>
        </div>
        <div id="resMestre" style="display:none">
            <div id="numMestreTotal" style="font-size:30px; font-weight:bold; color:var(--blue); margin-bottom:10px"></div>
            <div class="g-row">
                <div class="g-box"><small>G1</small><div id="gm1" class="g-num"></div></div>
                <div class="g-box"><small>G2</small><div id="gm2" class="g-num"></div></div>
                <div class="g-box" style="background:#fffde7"><small>G3</small><div id="gm3" class="g-num"></div></div>
            </div>
        </div>
    </div>
</div>

<script>
    let cicloAtivo = [];
    const STORAGE_KEY = "SABA_V13_3_DB";

    function carregarDB() {
        const salvo = localStorage.getItem(STORAGE_KEY);
        if(salvo) cicloAtivo = JSON.parse(salvo);
    }

    function getGrupo(d) {
        let n = parseInt(d);
        if (n === 0 || n === 100) return 25;
        return Math.ceil(n/4);
    }

    // Função que inverte a dezena dentro do mesmo grupo
    function inverterDezena(dezena) {
        let g = getGrupo(dezena);
        let dezenasDoGrupo = [(g*4)-3, (g*4)-2, (g*4)-1, g*4];
        if (g === 25) dezenasDoGrupo = [97, 98, 99, 0];
        
        // Retorna uma dezena diferente da original dentro do grupo
        return dezenasDoGrupo.find(d => d != dezena);
    }

    function processarGeral() {
        let novos = (document.getElementById('txtAtrasados').value.match(/\d+/g) || []).map(Number).filter(g => g <= 25);
        if(novos.length > 0) cicloAtivo = [...new Set(novos)];

        for(let i=1; i<=6; i++) {
            let el = document.getElementById('h'+i);
            let val = parseInt(el.value);
            if(!isNaN(val)) {
                cicloAtivo = cicloAtivo.filter(x => x !== val);
                cicloAtivo.push(val);
            }
            el.value = "";
        }

        const viciadas = [...new Set((document.getElementById('txtViciadas').value.match(/\d+/g) || []).map(Number))];
        const jaSairam = (document.getElementById('txtSaidas').value.match(/\d+/g) || []).map(Number);
        
        let pool = viciadas.filter(d => !jaSairam.includes(d));
        let topo = cicloAtivo.slice(0, 10);
        let listaTrabalho = [...new Set([...pool.filter(d => topo.includes(getGrupo(d))), ...pool])];

        let htmlFinal = "";
        for(let i=0; i<4; i++) {
            if(listaTrabalho.length >= 3) {
                let terno = listaTrabalho.splice(0, 3);
                let gruposNoJogo = [];
                
                // Correção de colisão por inversão
                terno = terno.map(dez => {
                    let g = getGrupo(dez);
                    if(gruposNoJogo.includes(g)) {
                        let novaDez = inverterDezena(dez);
                        return novaDez;
                    }
                    gruposNoJogo.push(g);
                    return dez;
                });

                htmlFinal += `<div class="t-item">JOGO ${i+1}: &nbsp; ${terno.map(n=>n.toString().padStart(2,'0')).join(' - ')}</div>`;
            }
        }

        document.getElementById('painelPalpite').style.display = 'block';
        document.getElementById('gridPalpites').innerHTML = htmlFinal || "Dados insuficientes.";
        
        localStorage.setItem(STORAGE_KEY, JSON.stringify(cicloAtivo));
        document.getElementById('txtAtrasados').value = ""; 
        document.getElementById('txtViciadas').value = ""; 
        document.getElementById('txtSaidas').value = "";
        alert("Jogos gerados com sucesso!");
    }

    function executarCalcMestre() {
        const a = document.getElementById('valA').value;
        const b = document.getElementById('valB').value;
        if(!a || !b) return;
        const total = (BigInt(a) * BigInt(b)).toString().padStart(6, '0');
        document.getElementById('resMestre').style.display = 'block';
        document.getElementById('numMestreTotal').innerText = total;
        let s = total.slice(-6);
        document.getElementById('gm1').innerText = getGrupo(s.substring(0,2)).toString().padStart(2,'0');
        document.getElementById('gm2').innerText = getGrupo(s.substring(2,4)).toString().padStart(2,'0');
        document.getElementById('gm3').innerText = getGrupo(s.substring(4,6)).toString().padStart(2,'0');
    }

    function fazerBackup() {
        const blob = new Blob([JSON.stringify(cicloAtivo)], {type: "application/json"});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob); link.download = `SABA_BKP.json`; link.click();
    }

    function restaurarBackup(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            cicloAtivo = JSON.parse(ev.target.result);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(cicloAtivo));
            location.reload();
        };
        reader.readAsText(e.target.files[0]);
    }

    function exibirLancados() { alert("Ciclo: " + cicloAtivo.join(" - ")); }
    function resetarSistema() { if(confirm("Zerar?")) { localStorage.removeItem(STORAGE_KEY); location.reload(); } }
</script>
</body>
</html>
