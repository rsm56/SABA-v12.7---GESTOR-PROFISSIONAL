<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SABA v13.6 - ESPELHO</title>
    <style>
        :root { --blue: #1a73e8; --red: #d93025; --green: #188038; --dark: #202124; }
        body { font-family: -apple-system, sans-serif; background: #f1f3f4; margin: 0; padding: 10px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 15px; border-radius: 12px; border-top: 6px solid var(--blue); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .toolbar { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .btn-tool { cursor: pointer; border: 1px solid #dadce0; border-radius: 8px; padding: 10px; font-weight: bold; font-size: 11px; background: white; flex: 1; }
        .grid { display: flex; flex-direction: column; gap: 12px; }
        .card { border: 1px solid #dadce0; padding: 12px; border-radius: 8px; }
        h3 { color: var(--blue); margin: 0 0 8px 0; font-size: 13px; text-transform: uppercase; border-bottom: 1px solid #eee; }
        textarea { width: 100%; height: 80px; border: 1px solid #bdc1c6; border-radius: 6px; padding: 8px; font-size: 14px; box-sizing: border-box; resize: none; font-family: monospace; }
        .h-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .h-box { background: #f8f9fa; padding: 4px; border-radius: 4px; text-align: center; border: 1px solid #eee; }
        input { width: 100%; padding: 8px; border: 1px solid #bdc1c6; border-radius: 6px; text-align: center; font-weight: bold; font-size: 16px; box-sizing: border-box; }
        .btn-exec { background: var(--blue); color: white; width: 100%; padding: 16px; font-size: 16px; margin: 15px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .panel { background: #e8f5e9; border: 2px solid var(--green); padding: 12px; border-radius: 8px; display: none; }
        .t-item { background: white; border: 1px solid var(--green); padding: 12px; border-radius: 6px; text-align: center; font-size: 19px; font-weight: bold; margin-bottom: 8px; letter-spacing: 2px; }
        .m-card { background: #f8f9fa; border: 1px solid #dadce0; padding: 15px; border-radius: 8px; margin-top: 15px; text-align: center; }
    </style>
</head>
<body onload="carregarDB()">

<div class="container">
    <div class="toolbar">
        <button class="btn-tool" onclick="exibirLancados()">📋 CICLO</button>
        <button class="btn-tool" onclick="fazerBackup()">💾 BKP</button>
        <button class="btn-tool" style="color:var(--red)" onclick="resetarSistema()">🧨 ZERAR</button>
    </div>

    <div class="grid">
        <div class="card">
            <h3>📋 CICLO & VICIADAS</h3>
            <textarea id="txtAt" placeholder="Grupos atrasados..."></textarea>
            <textarea id="txtVi" style="margin-top:5px; border-color:var(--blue)" placeholder="Dezenas viciadas..."></textarea>
        </div>
        <div class="card">
            <h3>🕒 RESULTADOS & EXCLUSÃO</h3>
            <div class="h-grid">
                <div class="h-box"><span>COR</span><input type="number" id="h1"></div>
                <div class="h-box"><span>PPT</span><input type="number" id="h2"></div>
                <div class="h-box"><span>PTM</span><input type="number" id="h3"></div>
                <div class="h-box"><span>PT</span><input type="number" id="h4"></div>
                <div class="h-box"><span>PTV</span><input type="number" id="h5"></div>
                <div class="h-box"><span>PTN</span><input type="number" id="h6"></div>
            </div>
            <input type="text" id="txtEx" style="margin-top:8px;" placeholder="Dezenas que já saíram hoje">
        </div>
    </div>

    <button class="btn-exec" onclick="processarGeral()">GERAR JOGOS COM INVERSÃO</button>

    <div id="painelPalpite" class="panel">
        <h3 style="color:var(--green)">🎯 PALPITES AMANHÃ (SISTEMA ESPELHO)</h3>
        <div id="gridPalpites"></div>
    </div>

    <div class="m-card">
        <h3>CÁLCULO MESTRE</h3>
        <div style="display:flex; justify-content:center; gap:5px; align-items:center;">
            <input type="number" id="vA" style="width:90px"> <b>X</b> <input type="number" id="vB" style="width:90px">
            <button onclick="executarCalcMestre()" style="padding:10px; background:var(--dark); color:white; border-radius:6px;">=</button>
        </div>
        <div id="resM" style="display:none; margin-top:10px;">
            <div id="totM" style="font-size:24px; font-weight:bold;"></div>
        </div>
    </div>
</div>

<script>
    let ciclo = [];
    const KEY = "SABA_V13_6_DB";

    function carregarDB() {
        const s = localStorage.getItem(KEY);
        if(s) ciclo = JSON.parse(s);
    }

    function getG(d) {
        let n = parseInt(d);
        if (n === 0 || n === 100) return 25;
        return Math.ceil(n/4);
    }

    // Lógica de Inversão (01 -> 10, 21 -> 12)
    function aplicarEspelho(d) {
        let s = d.toString().padStart(2, '0');
        let inv = s.split('').reverse().join('');
        let n = parseInt(inv);
        return n > 99 ? Math.abs(n - 50) : n; 
    }

    function processarGeral() {
        // 1. Ciclo e Resultados
        let nAt = (document.getElementById('txtAt').value.match(/\d+/g) || []).map(Number).filter(g => g <= 25);
        if(nAt.length > 0) ciclo = [...new Set(nAt)];

        for(let i=1; i<=6; i++) {
            let v = parseInt(document.getElementById('h'+i).value);
            if(!isNaN(v)) { ciclo = ciclo.filter(x => x !== v); ciclo.push(v); }
            document.getElementById('h'+i).value = "";
        }

        // 2. Preparação de Dezenas
        const viciadas = [...new Set((document.getElementById('txtVi').value.match(/\d+/g) || []).map(Number))];
        const jaSairam = (document.getElementById('txtEx').value.match(/\d+/g) || []).map(Number);
        
        let pool = viciadas.filter(d => !jaSairam.includes(d));
        let topo = ciclo.slice(0, 10);
        let listaTrabalho = [...new Set([...pool.filter(d => topo.includes(getG(d))), ...pool])];

        let html = "";
        for(let j=0; j<4; j++) {
            if(listaTrabalho.length < 3) break;
            
            let jogo = [];
            let gruposNoJogo = [];
            
            for(let k=0; k<3; k++) {
                if(listaTrabalho.length === 0) break;
                let dezena = listaTrabalho.shift();
                let g = getG(dezena);

                // Se a dezena já existe no jogo ou o grupo já existe, INVERTE (Espelho)
                if(jogo.includes(dezena) || gruposNoJogo.includes(g)) {
                    dezena = aplicarEspelho(dezena);
                }
                
                jogo.push(dezena);
                gruposNoJogo.push(getG(dezena));
            }

            if(jogo.length === 3) {
                html += `<div class="t-item">JOGO ${j+1}: &nbsp; ${jogo.map(n=>n.toString().padStart(2,'0')).join(' - ')}</div>`;
            }
        }

        document.getElementById('painelPalpite').style.display = 'block';
        document.getElementById('gridPalpites').innerHTML = html || "Dados insuficientes.";
        
        localStorage.setItem(KEY, JSON.stringify(ciclo));
        document.getElementById('txtAt').value = ""; 
        document.getElementById('txtVi').value = ""; 
        document.getElementById('txtEx').value = "";
        alert("Processado com Sucesso!");
    }

    function executarCalcMestre() {
        const a = document.getElementById('vA').value;
        const b = document.getElementById('vB').value;
        if(!a || !b) return;
        let res = (BigInt(a) * BigInt(b)).toString();
        document.getElementById('resM').style.display = 'block';
        document.getElementById('totM').innerText = "RESULTADO: " + res;
    }

    function exibirLancados() { alert("Ordem Ciclo: " + ciclo.join("-")); }
    function fazerBackup() {
        const b = new Blob([JSON.stringify(ciclo)], {type: "application/json"});
        const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = "SABA_DATA.json"; a.click();
    }
    function resetarSistema() { if(confirm("Limpar base de dados?")) { localStorage.removeItem(KEY); location.reload(); } }
</script>
</body>
</html>
